<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redis Perf Report — __TITLE__</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root { --bg:#0f172a; --card:#1e293b; --card2:#273449; --text:#e2e8f0; --muted:#94a3b8; --accent:#3b82f6; --border:#334155; }
* { box-sizing: border-box; }
body { margin:0; font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); line-height:1.5; }
#app { max-width:1200px; margin:0 auto; padding:24px; }
h1 { font-size:1.6rem; margin:0 0 8px; }
h2 { font-size:1.15rem; margin:0 0 12px; border-bottom:1px solid var(--border); padding-bottom:8px; }
h3 { font-size:1rem; margin:18px 0 8px; }
.card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:18px; margin:16px 0; }
.run-header { padding:8px 0 0; }
.run-header .meta { display:flex; flex-wrap:wrap; gap:16px; color:var(--muted); font-size:.9rem; }
.badge { font-size:.75rem; padding:2px 10px; border-radius:999px; vertical-align:middle; }
.badge.ok { background:#14532d; color:#86efac; }
.badge.bad { background:#7f1d1d; color:#fca5a5; }
.badge.run { background:#1e3a8a; color:#93c5fd; }
.error-box { background:#7f1d1d; color:#fecaca; padding:10px 14px; border-radius:8px; margin-top:10px; }
.kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; }
.kpi { background:var(--card2); border-radius:10px; padding:16px; }
.kpi-val { font-size:1.5rem; font-weight:700; color:#fff; }
.kpi-label { color:var(--muted); font-size:.85rem; margin-top:4px; }
.kpi-sub { color:var(--muted); font-size:.75rem; margin-top:2px; opacity:.8; }
table { width:100%; border-collapse:collapse; font-size:.88rem; }
th,td { text-align:right; padding:8px 10px; border-bottom:1px solid var(--border); }
th:first-child,td:first-child { text-align:left; }
thead th { color:var(--muted); font-weight:600; }
.muted { color:var(--muted); font-size:.85rem; }
.chart-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:16px; }
.chart-box { background:var(--card2); border-radius:8px; padding:10px; height:280px; }
.report-footer { text-align:center; color:var(--muted); font-size:.8rem; padding:20px 0; }
</style>
</head>
<body>
<div id="app"></div>
<div class="report-footer">Generated by Azure Managed Redis Performance Check · standalone report</div>
<script>
const RESULT = "__RESULT_JSON__";
/*__RENDER_JS__*/
document.addEventListener("DOMContentLoaded", function () {
  window.renderResult(RESULT, document.getElementById("app"));
});
</script>
</body>
</html>
